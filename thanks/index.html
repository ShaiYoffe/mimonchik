<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2D8B7E">
<title>מימונצ'יק — פנייתך התקבלה 🎉</title>
<meta name="description" content="פנייתך התקבלה בהצלחה. נציג יחזור אליך בהקדם.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://mimonchik.com/thanks/">
<link rel="icon" type="image/png" href="/assets/logo.png">
<link rel="apple-touch-icon" href="/assets/logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&family=Suez+One&display=swap" rel="stylesheet">

<style>
:root {
  --mint:        #A8E5A1;
  --mint-light:  #D1F5CC;
  --mint-50:     #ECF9E9;
  --teal:        #2D8B7E;
  --teal-deep:   #1A5E55;
  --sunshine:    #FFD93D;
  --sunshine-dk: #F5C518;
  --peach:       #FFE5D9;
  --cream:       #FFFCF5;
  --paper:       #FFFFFF;
  --ink:         #1A3A35;
  --ink-soft:    #4F635F;
  --ink-mute:    #8FA39F;
  --hairline:    #EDE5D2;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: 'Rubik', system-ui, sans-serif;
  font-weight: 400;
  color: var(--ink);
  background: var(--cream);
  background-image:
    radial-gradient(circle at 20% 18%, var(--mint-light) 0, transparent 1.5px),
    radial-gradient(circle at 80% 60%, var(--peach) 0, transparent 1.5px),
    radial-gradient(circle at 50% 90%, var(--mint-50) 0, transparent 1.5px);
  background-size: 60px 60px, 80px 80px, 50px 50px;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.thank-shell {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 32px 22px 36px;
  text-align: center;
  position: relative;
}

.brand {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  line-height: 0;
}
.brand-logo {
  height: 50px;
  width: auto;
  display: block;
  transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
}
.brand:hover .brand-logo { transform: rotate(-3deg) scale(1.05); }

/* sticker confirm card */
.thank-card {
  position: relative;
  max-width: 520px;
  margin: 32px auto;
  background: var(--paper);
  border: 3px solid var(--ink);
  border-radius: 32px;
  padding: 56px 32px 40px;
  box-shadow: 8px 8px 0 var(--ink), 8px 8px 0 4px var(--sunshine);
  animation: pop .5s cubic-bezier(.34, 1.56, .64, 1) both;
}
.thank-card::before {
  content: "";
  position: absolute;
  top: -18px;
  inset-inline-end: 30px;
  width: 90px;
  height: 24px;
  background: var(--mint);
  border: 2.5px solid var(--ink);
  border-radius: 4px;
  transform: rotate(-7deg);
  z-index: 5;
}
@keyframes pop {
  from { opacity: 0; transform: translateY(20px) rotate(-2deg); }
  to   { opacity: 1; transform: translateY(0) rotate(0); }
}

.mascot-circle {
  width: 130px; height: 130px;
  margin: 0 auto 22px;
  background: var(--mint-50);
  border: 3px solid var(--ink);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: 5px 5px 0 var(--sunshine);
  animation: bounce 2.4s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.mascot-circle img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  display: block;
}
.mascot-circle::after {
  content: "✓";
  position: absolute;
  top: -8px;
  inset-inline-end: -8px;
  width: 40px;
  height: 40px;
  background: var(--sunshine);
  border: 2.5px solid var(--ink);
  border-radius: 999px;
  color: var(--ink);
  font-family: 'Rubik', sans-serif;
  font-weight: 800;
  font-size: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transform: rotate(8deg);
  box-shadow: 2px 2px 0 var(--ink);
}

h1 {
  font-family: 'Suez One', 'Rubik', sans-serif;
  font-weight: 400;
  font-size: clamp(28px, 4.4vw, 42px);
  line-height: 1.1;
  letter-spacing: -0.015em;
  margin-bottom: 16px;
  color: var(--ink);
}
h1 em {
  font-style: normal;
  background: var(--sunshine);
  padding: 0 8px;
  border-radius: 8px;
  display: inline-block;
  transform: rotate(-1.5deg);
  box-shadow: 3px 3px 0 var(--ink);
}

.thank-card p {
  font-size: 16.5px;
  color: var(--ink-soft);
  line-height: 1.6;
  max-width: 38ch;
  margin: 0 auto;
  font-weight: 500;
}

.next-strip {
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: stretch;
}
.next-step {
  background: var(--cream);
  border: 2.5px solid var(--ink);
  border-radius: 14px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-align: start;
  box-shadow: 3px 3px 0 var(--ink);
  font-weight: 600;
}
.next-step:nth-child(1) { transform: rotate(-0.4deg); }
.next-step:nth-child(2) { transform: rotate(0.3deg); }
.next-step:nth-child(3) { transform: rotate(-0.2deg); }
.next-step .n {
  width: 32px; height: 32px;
  background: var(--sunshine);
  border: 2px solid var(--ink);
  border-radius: 999px;
  color: var(--ink);
  font-family: 'Rubik', sans-serif;
  font-weight: 800;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.next-step .t {
  font-size: 14px;
  color: var(--ink);
  font-weight: 600;
  line-height: 1.4;
}

.thank-foot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  font-size: 12.5px;
  color: var(--ink-mute);
  font-weight: 600;
}
.thank-foot a {
  color: var(--teal-deep);
  text-decoration: none;
  font-weight: 700;
  border-bottom: 2px solid var(--hairline);
  padding-bottom: 1px;
}
.thank-foot a:hover { border-color: var(--teal); }

@media (max-width: 540px) {
  .brand-logo { height: 42px; }
  .thank-card { padding: 44px 22px 32px; box-shadow: 5px 5px 0 var(--ink), 5px 5px 0 4px var(--sunshine); border-radius: 24px; }
  .mascot-circle { width: 110px; height: 110px; }
  .mascot-circle img { width: 86px; height: 86px; }
  .next-step .t { font-size: 13px; }
}
</style>

<div class="thank-shell">
  <a href="/" class="brand" aria-label="מימונצ'יק — חזרה לדף הבית">
    <img src="/assets/logo-wordmark.png" alt="מימונצ'יק" class="brand-logo">
  </a>

  <main class="thank-card">
    <div class="mascot-circle" aria-hidden="true">
      <img src="/assets/logo.png" alt="">
    </div>
    <h1>קיבלנו את הפנייה <em>שלך!</em></h1>
    <p>נציג מימונצ'יק יחזור אליך בהקדם עם הצעה מותאמת אישית מבין הגופים הפיננסיים המובילים בישראל.</p>

    <div class="next-strip" aria-hidden="true">
      <div class="next-step">
        <span class="n">1</span>
        <span class="t">בודקים את הפרטים שלך — בקפידה</span>
      </div>
      <div class="next-step">
        <span class="n">2</span>
        <span class="t">מתאימים את ההצעה הכי טובה עבורך</span>
      </div>
      <div class="next-step">
        <span class="n">3</span>
        <span class="t">מתקשרים — וזהו, סיימנו! 🎉</span>
      </div>
    </div>
  </main>

  <footer class="thank-foot">
    <span>© מימונצ'יק — כל הזכויות שמורות</span>
    <span><a href="/privacy-policy/" rel="noopener">תנאי שימוש ומדיניות פרטיות</a></span>
  </footer>
</div>
